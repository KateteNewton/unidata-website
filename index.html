<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>UniData - Coming Soon</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

      tailwind.config = {

        theme: {
          extend: {
            colors: {
              "on-secondary-fixed": "#341100",
              "background": "#f9f9ff",
              "tertiary-container": "#004941",
              "secondary": "#9d4300",
              "inverse-on-surface": "#ebf1ff",
              "surface-tint": "#4059aa",
              "surface-container-low": "#f0f3ff",
              "primary-fixed": "#dce1ff",
              "on-primary-fixed": "#00164e",
              "on-background": "#151c27",
              "on-secondary-container": "#5c2400",
              "tertiary-fixed-dim": "#4fdbc8",
              "error": "#ba1a1a",
              "on-secondary": "#ffffff",
              "inverse-primary": "#b6c4ff",
              "secondary-fixed": "#ffdbca",
              "on-surface": "#151c27",
              "surface": "#f9f9ff",
              "surface-container": "#e7eefe",
              "on-primary-container": "#90a8ff",
              "on-tertiary": "#ffffff",
              "outline-variant": "#c5c5d3",
              "on-surface-variant": "#444651",
              "on-error": "#ffffff",
              "surface-variant": "#dce2f3",
              "tertiary-fixed": "#71f8e4",
              "primary-container": "#1e3a8a",
              "outline": "#757682",
              "primary-fixed-dim": "#b6c4ff",
              "error-container": "#ffdad6",
              "secondary-container": "#fd761a",
              "inverse-surface": "#2a313d",
              "surface-container-lowest": "#ffffff",
              "primary": "#00236f",
              "surface-container-highest": "#dce2f3",
              "surface-container-high": "#e2e8f8",
              "on-tertiary-container": "#27c0ae",
              "on-primary": "#ffffff",
              "on-tertiary-fixed": "#00201c",
              "tertiary": "#00312b"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            animation: {
              "pulse-glow": "pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite",
              "float": "float 6s ease-in-out infinite"
            },
            keyframes: {
              "pulse-glow": {
                "0%, 100%": { opacity: "1", boxShadow: "0 0 20px rgba(30, 58, 138, 0.5)" },
                "50%": { opacity: ".8", boxShadow: "0 0 40px rgba(30, 58, 138, 0.8)" }
              },
              "float": {
                "0%, 100%": { transform: "translateY(0px)" },
                "50%": { transform: "translateY(-20px)" }
              }
            }
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #1e3a8a 0%, #00236f 100%);
        }
        .countdown-number {
            font-variant-numeric: tabular-nums;
        }
        .glow-text {
            text-shadow: 0 0 30px rgba(30, 58, 138, 0.4), 0 0 60px rgba(30, 58, 138, 0.2);
        }
        .animated-bg {
            background: linear-gradient(-45deg, #00236f, #1e3a8a, #fd761a, #00236f);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .blur-in {
            animation: blurIn 0.6s ease-out;
        }
        @keyframes blurIn {
            from {
                filter: blur(10px);
                opacity: 0;
            }
            to {
                filter: blur(0);
                opacity: 1;
            }
        }
        /* Extra scroll behavior: ensure smooth body scroll */
        html, body {
            scroll-behavior: smooth;
        }
        /* Ensure fixed background orbs don't interfere with scrolling */
        .fixed-orb {
            position: fixed;
            z-index: -10;
        }
        .logo-placeholder {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
    
        .logo-slot {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-slot img {
            max-height: 36px;
            width: auto;
            display: block;
        }
    </style>
</head>

<body class="bg-surface font-body text-on-surface">

    <!-- Animated Background -->
    <div class="animated-bg fixed inset-0 opacity-5 -z-10"></div>
    
    <!-- Floating Orbs (Fixed) -->
    <div class="fixed top-10 left-10 w-64 h-64 bg-primary rounded-full filter blur-3xl opacity-10 animate-float -z-10"></div>
    <div class="fixed bottom-10 right-10 w-64 h-64 bg-secondary-container rounded-full filter blur-3xl opacity-10 animate-float -z-10" style="animation-delay: 2s;"></div>

    <!-- Main Content - scrollable with min-h-screen and flex column -->
    <div class="relative z-10 w-full min-h-screen flex flex-col px-4 py-8">
        
        <!-- Logo/Branding - top area (auto) -->
        <div class="text-center mb-12 blur-in">
            <div class="logo-placeholder">
                <div id="customLogoSlot" class="logo-slot text-sm md:text-base px-2 md:px-3 py-0.5 md:py-1">
                    <span class="opacity-80 text-sm font-small"><a href="index.html"><img src="images/unidata-logo.png"></a></span>
                </div>
            </div>
            <p class="text-lg md:text-2xl text-on-surface-variant font-headline font-semibold">
                Something Extraordinary is Coming
            </p>
        </div>

        <!-- Countdown Timer (auto width, centered) -->
        <div class="max-w-4xl mx-auto w-full bg-white/80 dark:bg-slate-950/80 backdrop-blur-lg rounded-3xl p-8 md:p-12 lg:p-20 shadow-2xl border border-primary/10 mb-12 blur-in" style="animation-delay: 0.2s;">
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8 mb-8">
                <!-- Days -->
                <div class="text-center">
                    <div class="relative">
                        <div class="absolute inset-0 rounded-2xl signature-gradient opacity-10 blur-xl"></div>
                        <div class="relative bg-surface-container-low p-6 md:p-8 rounded-2xl border border-primary/20">
                            <div class="text-3xl md:text-5xl font-headline font-black text-primary countdown-number glow-text" id="days">0</div>
                            <p class="text-xs md:text-sm text-on-surface-variant font-bold uppercase tracking-widest mt-3">Days</p>
                        </div>
                    </div>
                </div>

                <!-- Hours -->
                <div class="text-center">
                    <div class="relative">
                        <div class="absolute inset-0 rounded-2xl signature-gradient opacity-10 blur-xl"></div>
                        <div class="relative bg-surface-container-low p-6 md:p-8 rounded-2xl border border-primary/20">
                            <div class="text-3xl md:text-5xl font-headline font-black text-primary countdown-number glow-text" id="hours">0</div>
                            <p class="text-xs md:text-sm text-on-surface-variant font-bold uppercase tracking-widest mt-3">Hours</p>
                        </div>
                    </div>
                </div>

                <!-- Minutes -->
                <div class="text-center">
                    <div class="relative">
                        <div class="absolute inset-0 rounded-2xl signature-gradient opacity-10 blur-xl"></div>
                        <div class="relative bg-surface-container-low p-6 md:p-8 rounded-2xl border border-primary/20">
                            <div class="text-3xl md:text-5xl font-headline font-black text-primary countdown-number glow-text" id="minutes">0</div>
                            <p class="text-xs md:text-sm text-on-surface-variant font-bold uppercase tracking-widest mt-3">Minutes</p>
                        </div>
                    </div>
                </div>

                <!-- Seconds -->
                <div class="text-center">
                    <div class="relative">
                        <div class="absolute inset-0 rounded-2xl signature-gradient opacity-10 blur-xl" id="secondGlow"></div>
                        <div class="relative bg-surface-container-low p-6 md:p-8 rounded-2xl border border-primary/20" id="secondBox">
                            <div class="text-3xl md:text-5xl font-headline font-black text-primary countdown-number glow-text" id="seconds">0</div>
                            <p class="text-xs md:text-sm text-on-surface-variant font-bold uppercase tracking-widest mt-3">Seconds</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Status Message -->
            <div class="text-center" id="statusContainer">
                <p class="text-on-surface-variant text-sm md:text-base">
                    Get ready to unlock exclusive academic resources designed for your success
                </p>
            </div>
        </div>

        <!-- Features Preview - with fully responsive font sizes for feature labels -->
        <div class="max-w-2xl mx-auto w-full blur-in" style="animation-delay: 0.4s;">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-headline font-bold text-primary mb-4">What's Coming</h2>
                <div class="h-1 w-12 bg-secondary-container mx-auto rounded-full"></div>
            </div>
            <div class="grid grid-cols-3 gap-4 md:gap-6">
                <!-- Comprehensive Library card -->
                <div class="bg-white/60 dark:bg-slate-900/60 backdrop-blur p-4 rounded-xl text-center transition hover:bg-white/80 dark:hover:bg-slate-800/80">
                    <span class="material-symbols-outlined text-3xl text-primary block mb-2">auto_awesome</span>
                    <!-- Font size adapts across devices: smallest to largest breakpoints -->
                    <p class="text-[0.7rem] sm:text-xs md:text-sm lg:text-base font-bold text-on-surface">Comprehensive Library</p>
                </div>
                <!-- Peer Learning card -->
                <div class="bg-white/60 dark:bg-slate-900/60 backdrop-blur p-4 rounded-xl text-center transition hover:bg-white/80 dark:hover:bg-slate-800/80">
                    <span class="material-symbols-outlined text-3xl text-primary block mb-2">group_work</span>
                    <p class="text-[0.7rem] sm:text-xs md:text-sm lg:text-base font-bold text-on-surface">Peer Learning</p>
                </div>
                <!-- Expert Verified card -->
                <div class="bg-white/60 dark:bg-slate-900/60 backdrop-blur p-4 rounded-xl text-center transition hover:bg-white/80 dark:hover:bg-slate-800/80">
                    <span class="material-symbols-outlined text-3xl text-primary block mb-2">verified</span>
                    <p class="text-[0.7rem] sm:text-xs md:text-sm lg:text-base font-bold text-on-surface">Expert Verified</p>
                </div>
            </div>
        </div>

        <!-- Spacer that pushes footer to the bottom when content is short, but allows scrolling when content overflows -->
        <div class="flex-grow"></div>

        <!-- Footer Text - positioned at the bottom of the flex column -->
        <div class="text-center text-xs md:text-sm text-on-surface-variant mt-12 pt-4 pb-2">
            <p>© 2026 UniData | Powered by RyzeInc</p>
        </div>
    </div>

    <!-- Hidden Audio for clock tick (silent wav placeholder) -->
    <audio id="clockTick" preload="auto">
        <source src="data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQIAAAAAAA==" type="audio/wav">
    </audio>

    <script>
        // Set the unlock flag in localStorage when accessing this page
        localStorage.setItem('unidata-site-launched', 'false');
        
        // Clock tick sound generation (web audio)
        function generateClockTickSound() {
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) return;
                const audioContext = new AudioContextClass();
                const duration = 0.1;
                const now = audioContext.currentTime;
                
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.frequency.value = 800;
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
                
                osc.start(now);
                osc.stop(now + duration);
                
                // Auto-close context after sound to avoid too many contexts
                setTimeout(() => {
                    audioContext.close().catch(e => console.warn);
                }, 1000);
            } catch (e) {
                // Silent fail if audio context not allowed
            }
        }

        // Countdown timer
        function updateCountdown() {
            // Target time: April 28, 2026, 20:00 (8:00 PM)
            const targetDate = new Date(2026, 3, 28, 20, 0, 0).getTime();
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference <= 0) {
                // Countdown finished, unlock the site
                localStorage.setItem('unidata-unlocked', 'true');
                localStorage.setItem('unidata-unlock-time', new Date().getTime());
                
                // Update display
                document.getElementById('days').textContent = '0';
                document.getElementById('hours').textContent = '0';
                document.getElementById('minutes').textContent = '0';
                document.getElementById('seconds').textContent = '0';
                
                const statusContainer = document.getElementById('statusContainer');
                statusContainer.innerHTML = `
                    <div class="bg-gradient-to-r from-tertiary-fixed to-primary bg-clip-text text-transparent">
                        <h3 class="text-2xl font-headline font-black mb-2">🎉 Welcome to UniData!</h3>
                        <p class="text-on-surface-variant">Redirecting you now...</p>
                    </div>
                `;
                
                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 2000);
                
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((difference / 1000 / 60) % 60);
            const seconds = Math.floor((difference / 1000) % 60);

            // Store previous seconds to trigger tick
            const prevSeconds = parseInt(document.getElementById('seconds').textContent) || 0;
            
            // Update display
            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

            // Play sound when seconds change and audio allowed (only if seconds decreased/increased)
            if (seconds !== prevSeconds) {
                try {
                    generateClockTickSound();
                } catch (e) {
                    // Audio context may fail
                }
            }

            // Pulse animation on seconds box
            const secondBox = document.getElementById('secondBox');
            const secondGlow = document.getElementById('secondGlow');
            if (seconds % 2 === 0) {
                secondBox.style.boxShadow = '0 0 30px rgba(30, 58, 138, 0.5)';
                if (secondGlow) secondGlow.style.boxShadow = '0 0 40px rgba(30, 58, 138, 0.8) inset';
            } else {
                secondBox.style.boxShadow = '';
                if (secondGlow) secondGlow.style.boxShadow = '';
            }
        }

        // Initial update
        updateCountdown();

        // Update every 100ms for smooth countdown with smooth second transitions
        setInterval(updateCountdown, 100);
        
        // Minor: Ensure that any fixed background orbs remain below content while scrolling
        // No additional changes needed
    </script>
</body>
</html>
